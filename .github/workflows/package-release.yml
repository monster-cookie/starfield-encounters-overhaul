name: Package Release

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write

###############################################################################
# CONFIG: Update these for this creation.
#
# Using these instead of secrets cause they are not secret and shouldn't be hidden in the logs.
#
# That being said some repository secrets are required but only if env.UPLOAD_TO_NEXUSMODS is true:
#   - NEXUSMODS_API_KEY the API key to use see https://www.nexusmods.com/settings/api-keys use the developer API key at the bottom of the page
#   - NEXUSMODS_FILE_ID the FILE ID of to replace in the Mod's Files section:
#       To get a file ID to use in this action, you need to have created a mod page on Nexus Mods and uploaded at least one file. The file ID 
#       can be found by checking the "API Info" option in the Files tab of the public-facing mod page, or in the edit menu of the Manage Files page.
#
###############################################################################
env:
  CREATION_DISPLAY_NAME: Venworks Encounters Overhaul
  CREATION_FILE_NAME: Venworks-EncountersOverhaul
  NEXUSMODS_CATEGORY: main
  UPLOAD_TO_NEXUSMODS: true

jobs:
    validate-tag-source:
        name: Validate Tag Source
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.validate.outputs.version }}

        steps:
            - name: Verify tag and master HEAD
              id: validate
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG_CREATED: ${{ github.event.created }}
                  TAG_NAME: ${{ github.ref_name }}
                  TAG_SHA: ${{ github.sha }}
              run: |
                  if [ "$TAG_CREATED" != "true" ]; then
                    echo "Release tag '$TAG_NAME' was updated instead of newly created."
                    exit 1
                  fi

                  if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "Release tag '$TAG_NAME' must use the v<major>.<minor>.<patch> format."
                    exit 1
                  fi

                  MASTER_SHA="$(gh api "repos/${{ github.repository }}/commits/master" --jq '.sha')"

                  if [ "$TAG_SHA" != "$MASTER_SHA" ]; then
                    echo "Tag is not on the current master HEAD."
                    echo "Tag SHA:    $TAG_SHA"
                    echo "Master SHA: $MASTER_SHA"
                    exit 1
                  fi

                  echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

    package-release:
        name: Package Release
        needs: validate-tag-source
        runs-on: ubuntu-latest
        env:
            PACKAGE_VERSION: ${{ needs.validate-tag-source.outputs.version }}

        steps:
            - name: Check out repository
              uses: actions/checkout@v6
              with:
                  lfs: true

            - name: Prepare release packages
              id: package
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'

                  $releaseRoot = Join-Path $env:GITHUB_WORKSPACE 'artifacts/release'
                  New-Item -ItemType Directory -Force -Path $releaseRoot | Out-Null

                  $esmPath = Join-Path $env:GITHUB_WORKSPACE "Staging/${{ env.CREATION_FILE_NAME }}.esm"
                  if (-not [System.IO.File]::Exists($esmPath)) {
                      throw "Required release file '$esmPath' was not found."
                  }

                  $ba2Files = Get-ChildItem -Path (Join-Path $env:GITHUB_WORKSPACE 'Staging') -Filter '*.ba2' -File
                  if (-not $ba2Files) {
                      throw "No BA2 archives were found in Staging."
                  }

                  $pcBa2Files = @($ba2Files | Where-Object {
                      $_.BaseName -notmatch '_XBox$' -and $_.BaseName -notmatch '_PS$'
                  })
                  $xboxBa2Files = @($ba2Files | Where-Object {
                      $_.BaseName -match '_XBox$'
                  })

                  if ($pcBa2Files.Count -eq 0) {
                      throw "No PC BA2 archives were found in Staging."
                  }

                  if ($xboxBa2Files.Count -eq 0) {
                      throw "No XBox BA2 archives were found in Staging."
                  }

                  function New-PackageRoot {
                      param(
                          [Parameter(Mandatory)]
                          [string] $Name
                      )

                      $path = Join-Path $releaseRoot $Name
                      New-Item -ItemType Directory -Force -Path $path | Out-Null
                      Copy-Item -LiteralPath $esmPath -Destination $path
                      return $path
                  }

                  function Copy-Archives {
                      param(
                          [Parameter(Mandatory)]
                          [System.IO.FileInfo[]] $Files,

                          [Parameter(Mandatory)]
                          [string] $Destination
                      )

                      foreach ($file in $Files) {
                          Copy-Item -LiteralPath $file.FullName -Destination $Destination
                      }
                  }

                  function Copy-PlayStationArchives {
                      param(
                          [Parameter(Mandatory)]
                          [System.IO.FileInfo[]] $Files,

                          [Parameter(Mandatory)]
                          [string] $Destination
                      )

                      foreach ($file in $Files) {
                          $psArchiveName = $file.Name -replace ' - ', '_'
                          $psArchiveName = $psArchiveName -replace '\.ba2$', '_PS.ba2'
                          Copy-Item -LiteralPath $file.FullName -Destination (Join-Path $Destination $psArchiveName)
                      }
                  }

                  $pcRoot = New-PackageRoot -Name 'pc'
                  Copy-Archives -Files $pcBa2Files -Destination $pcRoot
                  $pcPackagePath = Join-Path $releaseRoot "$env:CREATION_FILE_NAME-PC-$env:PACKAGE_VERSION.zip"
                  Compress-Archive -Path (Join-Path $pcRoot '*') -DestinationPath $pcPackagePath -Force

                  $xboxRoot = New-PackageRoot -Name 'xbox'
                  Copy-Archives -Files $xboxBa2Files -Destination $xboxRoot
                  $xboxPackagePath = Join-Path $releaseRoot "$env:CREATION_FILE_NAME-XBox-$env:PACKAGE_VERSION.zip"
                  Compress-Archive -Path (Join-Path $xboxRoot '*') -DestinationPath $xboxPackagePath -Force

                  $ps5Root = New-PackageRoot -Name 'ps5'
                  Copy-PlayStationArchives -Files $pcBa2Files -Destination $ps5Root
                  $ps5PackagePath = Join-Path $releaseRoot "$env:CREATION_FILE_NAME-PS5-$env:PACKAGE_VERSION.zip"
                  Compress-Archive -Path (Join-Path $ps5Root '*') -DestinationPath $ps5PackagePath -Force

                  $creationsSiteRoot = New-PackageRoot -Name 'creations-site'
                  Copy-Archives -Files $pcBa2Files -Destination $creationsSiteRoot
                  Copy-Archives -Files $xboxBa2Files -Destination $creationsSiteRoot
                  Copy-PlayStationArchives -Files $pcBa2Files -Destination $creationsSiteRoot
                  $creationsSitePackagePath = Join-Path $releaseRoot "$env:CREATION_FILE_NAME-CreationsSite-$env:PACKAGE_VERSION.zip"
                  Compress-Archive -Path (Join-Path $creationsSiteRoot '*') -DestinationPath $creationsSitePackagePath -Force

                  "pc_package_path=$pcPackagePath" >> $env:GITHUB_OUTPUT
                  "xbox_package_path=$xboxPackagePath" >> $env:GITHUB_OUTPUT
                  "ps5_package_path=$ps5PackagePath" >> $env:GITHUB_OUTPUT
                  "creations_site_package_path=$creationsSitePackagePath" >> $env:GITHUB_OUTPUT

            - name: Upload release package artifacts
              uses: actions/upload-artifact@v6
              with:
                  name: ${{ env.CREATION_FILE_NAME }}-${{ env.PACKAGE_VERSION }}
                  path: |
                      ${{ steps.package.outputs.pc_package_path }}
                      ${{ steps.package.outputs.xbox_package_path }}
                      ${{ steps.package.outputs.ps5_package_path }}
                      ${{ steps.package.outputs.creations_site_package_path }}

    create-release:
        name: Create GitHub and Nexus Releases
        needs:
            - validate-tag-source
            - package-release
        runs-on: ubuntu-latest
        env:
            PACKAGE_VERSION: ${{ needs.validate-tag-source.outputs.version }}

        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Download release package artifact
              uses: actions/download-artifact@v6
              with:
                  name: ${{ env.CREATION_FILE_NAME }}-${{ env.PACKAGE_VERSION }}
                  path: ./artifacts/release

            - name: Extract release notes
              id: release-notes
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'

                  $version = $env:PACKAGE_VERSION
                  $changeLogPath = Join-Path $env:GITHUB_WORKSPACE 'CHANGELOG.md'
                  $releaseNotesPath = Join-Path $env:GITHUB_WORKSPACE 'artifacts/release/release-notes.md'
                  $nexusDescriptionPath = Join-Path $env:GITHUB_WORKSPACE 'artifacts/release/nexus-description.bbcode'

                  $content = Get-Content -LiteralPath $changeLogPath -Raw
                  $escapedVersion = [Regex]::Escape($version)
                  $pattern = "(?ms)^## Version $escapedVersion\s*.*?(?=^## Version \d+\.\d+\.\d+|\z)"
                  $match = [Regex]::Match($content, $pattern)

                  if (-not $match.Success) {
                      throw "Unable to find release notes in CHANGELOG.md for version $version."
                  }

                  $releaseNotes = $match.Value.Trim()
                  [System.IO.File]::WriteAllText($releaseNotesPath, $releaseNotes)

                  $lines = $releaseNotes -split "\r?\n"
                  $bbcodeLines = [System.Collections.Generic.List[string]]::new()
                  $inList = $false

                  foreach ($line in $lines) {
                      if ($line -match '^\s*-\s+(.*)$') {
                          if (-not $inList) {
                              $bbcodeLines.Add('[list]')
                              $inList = $true
                          }

                          $bbcodeLines.Add("[*]$($Matches[1])")
                          continue
                      }

                      if ($inList) {
                          $bbcodeLines.Add('[/list]')
                          $inList = $false
                      }

                      if ($line -match '^##\s+(.+)$') {
                          $bbcodeLines.Add("[b]$($Matches[1])[/b]")
                          continue
                      }

                      if ($line -match '^###\s+(.+)$') {
                          $bbcodeLines.Add("[b]$($Matches[1])[/b]")
                          continue
                      }

                      $convertedLine = $line -replace '\*\*(.+?)\*\*', '[b]$1[/b]'
                      $convertedLine = $convertedLine -replace '\*(.+?)\*', '[i]$1[/i]'
                      $convertedLine = $convertedLine -replace '`(.+?)`', '$1'
                      $bbcodeLines.Add($convertedLine)
                  }

                  if ($inList) {
                      $bbcodeLines.Add('[/list]')
                  }

                  $nexusDescription = ($bbcodeLines -join [Environment]::NewLine).Trim()
                  [System.IO.File]::WriteAllText($nexusDescriptionPath, $nexusDescription)

                  "release_notes_path=$releaseNotesPath" >> $env:GITHUB_OUTPUT
                  "nexus_description_path=$nexusDescriptionPath" >> $env:GITHUB_OUTPUT
                  $delimiter = [Guid]::NewGuid().ToString()
                  "nexus_description<<$delimiter" >> $env:GITHUB_OUTPUT
                  $nexusDescription >> $env:GITHUB_OUTPUT
                  $delimiter >> $env:GITHUB_OUTPUT

            - name: Resolve release packages
              id: release-package
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'

                  $pcPackagePath = Get-ChildItem -Path ./artifacts/release -Filter "$env:CREATION_FILE_NAME-PC-$env:PACKAGE_VERSION.zip" -File | Select-Object -First 1 -ExpandProperty FullName
                  $xboxPackagePath = Get-ChildItem -Path ./artifacts/release -Filter "$env:CREATION_FILE_NAME-XBox-$env:PACKAGE_VERSION.zip" -File | Select-Object -First 1 -ExpandProperty FullName
                  $ps5PackagePath = Get-ChildItem -Path ./artifacts/release -Filter "$env:CREATION_FILE_NAME-PS5-$env:PACKAGE_VERSION.zip" -File | Select-Object -First 1 -ExpandProperty FullName
                  $creationsSitePackagePath = Get-ChildItem -Path ./artifacts/release -Filter "$env:CREATION_FILE_NAME-CreationsSite-$env:PACKAGE_VERSION.zip" -File | Select-Object -First 1 -ExpandProperty FullName

                  if (-not $pcPackagePath) {
                      throw "Unable to find PC release package for version $env:PACKAGE_VERSION."
                  }

                  if (-not $xboxPackagePath) {
                      throw "Unable to find XBox release package for version $env:PACKAGE_VERSION."
                  }

                  if (-not $ps5PackagePath) {
                      throw "Unable to find PS5 release package for version $env:PACKAGE_VERSION."
                  }

                  if (-not $creationsSitePackagePath) {
                      throw "Unable to find Creations Site release package for version $env:PACKAGE_VERSION."
                  }

                  "pc_path=$pcPackagePath" >> $env:GITHUB_OUTPUT
                  "xbox_path=$xboxPackagePath" >> $env:GITHUB_OUTPUT
                  "ps5_path=$ps5PackagePath" >> $env:GITHUB_OUTPUT
                  "creations_site_path=$creationsSitePackagePath" >> $env:GITHUB_OUTPUT

            - name: Create GitHub release
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "${{ github.ref_name }}" \
                    "${{ steps.release-package.outputs.pc_path }}" \
                    "${{ steps.release-package.outputs.xbox_path }}" \
                    "${{ steps.release-package.outputs.ps5_path }}" \
                    "${{ steps.release-package.outputs.creations_site_path }}" \
                    --title "${{ github.ref_name }}" \
                    --notes-file "${{ steps.release-notes.outputs.release_notes_path }}"

            - name: Validate Nexus Mods upload configuration
              if: ${{ fromJSON(env.UPLOAD_TO_NEXUSMODS) == true }}
              shell: bash
              env:
                  NEXUSMODS_API_KEY: ${{ secrets.NEXUSMODS_API_KEY }}
                  NEXUSMODS_FILE_ID: ${{ secrets.NEXUSMODS_FILE_ID }}
              run: |
                  if [ -z "$NEXUSMODS_API_KEY" ]; then
                    echo "NEXUSMODS_API_KEY is required when UPLOAD_TO_NEXUSMODS is enabled."
                    exit 1
                  fi

                  if [ -z "$NEXUSMODS_FILE_ID" ]; then
                    echo "NEXUSMODS_FILE_ID is required when UPLOAD_TO_NEXUSMODS is enabled."
                    exit 1
                  fi

            - name: Upload release to Nexus Mods
              if: ${{ fromJSON(env.UPLOAD_TO_NEXUSMODS) }}
              uses: Nexus-Mods/upload-action@v1.0.0-beta.8
              with:
                  api_key: ${{ secrets.NEXUSMODS_API_KEY }}
                  file_id: ${{ secrets.NEXUSMODS_FILE_ID }}
                  filename: ${{ steps.release-package.outputs.pc_path }}
                  version: ${{ env.PACKAGE_VERSION }}
                  category: ${{ env.NEXUSMODS_CATEGORY }}
                  display_name: ${{ env.CREATION_DISPLAY_NAME }}
                  archive_existing_version: true
                  primary_mod_manager_download: true
                  allow_mod_manager_download: true
                  description: ${{ steps.release-notes.outputs.nexus_description }}
